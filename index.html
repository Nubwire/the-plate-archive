<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Plate Archive Co. | Curated Antique Ceramics</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { serif: ['Cormorant Garamond', 'serif'], sans: ['Inter', 'sans-serif'] },
          colors: {
            archive: { bg: '#F7F3F0', text: '#1a1a1a', accent: '#8c7b6b', border: '#e5e5e5', green: '#1b3c2e', gold: '#d4af37' }
          }
        }
      }
    }
  </script>

  <style type="text/css">
    body { background-color: #F7F3F0; color: #1a1a1a; font-family: 'Cormorant Garamond', serif; -webkit-font-smoothing: antialiased; }
    .hidden { display: none !important; }
    
    /* Clean Mode Toggle - Styled as a premium toolbar */
    .mode-toggle { @apply fixed top-0 left-0 w-full z-[100] bg-archive-green text-white text-[10px] py-1 px-4 flex justify-between items-center font-sans uppercase tracking-widest shadow-md; }
    
    /* Product Grid layout */
    #productGrid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; }
    @media (min-width: 768px) { #productGrid { grid-template-columns: repeat(4, 1fr); } }

    /* Fix for the spinning/loading icons */
    .loading-spin { animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</head>

<body class="min-h-screen flex flex-col">

  <div id="modeToggle" class="mode-toggle hidden">
    <span>Archive Management Active</span>
    <div class="flex space-x-4">
      <button onclick="setMode('admin')" class="font-bold border-b border-white">Admin View</button>
      <button onclick="setMode('customer')" class="opacity-70 hover:opacity-100">Live Site View</button>
      <button onclick="handleSignOut()" class="text-red-300">Logout</button>
    </div>
  </div>

  <header class="bg-white border-b border-archive-border py-6 px-4 md:px-8 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <div class="flex items-center space-x-4 cursor-pointer" onclick="location.reload()">
        <img src="logo.jpg" class="w-14 h-14 rounded-full border border-archive-gold object-cover" onerror="this.src='https://via.placeholder.com/60/1b3c2e/d4af37?text=P'">
        <div>
          <h1 class="text-xl md:text-2xl font-serif tracking-[0.2em] uppercase leading-none">The Plate Archive</h1>
          <p class="text-[9px] text-gray-400 font-sans uppercase tracking-[0.3em] mt-1">A Federation Collectibles Company</p>
        </div>
      </div>

      <div class="flex items-center space-x-4">
        <div id="googleSignInContainer"></div>
        <button id="toggleCartBtn" class="bg-archive-green text-white px-5 py-2 text-[11px] font-sans uppercase tracking-widest hover:bg-black transition-all">
          Cart (<span id="cartCount">0</span>)
        </button>
      </div>
    </div>
  </header>

  <section class="relative h-[450px] flex items-center justify-center overflow-hidden">
    <img src="hero.jpg" class="absolute inset-0 w-full h-full object-cover brightness-[0.7]" onerror="this.src='https://via.placeholder.com/1200x500/1b3c2e/1b3c2e'">
    <div class="relative z-10 text-center text-white">
      <h2 class="text-5xl md:text-7xl italic font-light mb-2">Timeless Elegance</h2>
      <p class="text-archive-gold font-sans uppercase tracking-[0.5em] text-[10px]">Curating History, One Plate at a Time</p>
    </div>
  </section>

  <main class="flex-1 max-w-7xl mx-auto px-4 md:px-8 py-12 w-full">
    
    <div id="shopPage">
      <section id="adminView" class="hidden mb-12 p-10 border-2 border-dashed border-archive-border bg-white text-center">
        <h3 class="text-xl mb-4 font-serif italic">Archive Synchronization</h3>
        <input type="file" id="csvInput" accept=".csv" class="hidden" onchange="handleFileUpload(this.files[0])">
        <label for="csvInput" class="inline-block bg-archive-accent text-white px-6 py-2 rounded-sm cursor-pointer hover:bg-archive-green transition-all text-xs font-sans uppercase tracking-widest">
          Upload Inventory CSV
        </label>
        <p id="uploadStatus" class="mt-4 text-xs text-gray-500 font-sans"></p>
      </section>

      <section id="customerView">
        <div class="flex justify-between items-end border-b border-archive-border pb-4 mb-8">
          <input type="text" id="searchInput" placeholder="Search the archive..." 
                 class="bg-transparent font-serif text-2xl focus:outline-none w-1/2">
          <span class="text-[10px] font-sans text-gray-400 uppercase tracking-widest">
            <span id="productCount">0</span> Items Listed
          </span>
        </div>
        <div id="productGrid"></div>
        <div id="emptyState" class="hidden text-center py-20 italic text-gray-400">No items found in this section of the archive.</div>
      </section>
    </div>

  </main>

  <footer class="py-10 border-t border-archive-border text-center bg-white">
    <p class="text-[10px] text-gray-400 font-sans uppercase tracking-[0.3em]">
      &copy; 2026 THE PLATE ARCHIVE CO. &bull; Sydney, NSW
    </p>
  </footer>

  <script>
    const state = { products: [], cart: {}, mode: 'customer', isAdmin: false };

    function setMode(mode) {
      state.mode = mode;
      document.getElementById('adminView').classList.toggle('hidden', mode !== 'admin');
      document.getElementById('customerView').classList.toggle('hidden', mode === 'admin');
    }

    function handleCredentialResponse(response) {
      state.isAdmin = true;
      document.getElementById('modeToggle').classList.remove('hidden');
      document.getElementById('googleSignInContainer').classList.add('hidden');
      setMode('admin');
    }

    function handleSignOut() {
      state.isAdmin = false;
      document.getElementById('modeToggle').classList.add('hidden');
      document.getElementById('googleSignInContainer').classList.remove('hidden');
      setMode('customer');
    }

    window.onload = function() {
      if (window.google) {
        google.accounts.id.initialize({ 
          client_id: '167448372477-itfj4vllgfnj0th6ac445mblhsth8h7n.apps.googleusercontent.com', 
          callback: handleCredentialResponse 
        });
        google.accounts.id.renderButton(document.getElementById('googleSignInContainer'), { theme: 'outline', size: 'medium' });
      }
    };

    // The rest of your existing CSV and Cart Logic would go here
  </script>
</body>
</html>
