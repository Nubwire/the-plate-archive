<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>The Plate Archive Co.</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            serif: ['Cormorant Garamond', 'serif'],
            sans: ['Inter', 'sans-serif']
          },
          colors: {
            archive: {
              bg: '#fafafa',
              text: '#1a1a1a',
              accent: '#8c7b6b',
              border: '#e5e5e5'
            }
          }
        }
      }
    }
  </script>
  <style>
    body { @apply bg-archive-bg text-archive-text font-serif antialiased; }
    .product-card { @apply bg-white border border-archive-border p-4 transition-all duration-200 hover:shadow-sm cursor-pointer; }
    .btn { @apply px-4 py-2 border border-archive-accent text-archive-accent hover:bg-archive-accent hover:text-white transition-colors font-sans text-sm uppercase tracking-wide; }
    .btn-primary { @apply bg-archive-accent text-white hover:bg-[#7a6a5a] border-transparent; }
    .input-field { @apply w-full border border-archive-border p-2 font-sans text-sm focus:outline-none focus:border-archive-accent; }
    #cart-tray { @apply fixed bottom-0 right-0 m-4 w-80 bg-white border border-archive-border shadow-lg z-50 max-h-[80vh] flex flex-col; }
    .mode-toggle { @apply fixed top-4 right-4 z-40 flex items-center space-x-2 bg-white border border-archive-border px-3 py-1.5 rounded-full shadow-sm font-sans text-xs; }
    .upload-zone { @apply border-2 border-dashed border-archive-border rounded-lg p-8 text-center hover:border-archive-accent transition-colors cursor-pointer; }
    .hidden { display: none !important; }
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    #productGrid { @apply grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6; }
  </style>
</head>
<body class="min-h-screen flex flex-col">

  <!-- Mode Toggle -->
  <div class="mode-toggle">
    <span class="font-medium">Mode:</span>
    <button id="adminBtn" class="font-bold text-archive-accent">Admin</button>
    <span>/</span>
    <button id="customerBtn" class="text-gray-500">Customer</button>
  </div>

  <!-- Header -->
  <header class="border-b border-archive-border py-6 px-4 md:px-8">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <h1 class="text-2xl md:text-3xl font-light tracking-tight">The Plate Archive Co.</h1>
      <button id="toggleCartBtn" class="btn hidden">Selection (<span id="cartCount">0</span>)</button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="flex-1 max-w-7xl mx-auto px-4 md:px-8 py-8 w-full">
    
    <!-- Admin Mode -->
    <section id="adminView">
      <div class="max-w-2xl mx-auto text-center py-16">
        <h2 class="text-xl font-light mb-2">Archive Initialization</h2>
        <p class="text-gray-600 mb-8 font-sans text-sm">Upload your Stock Master CSV to populate the storefront.</p>
        
        <div class="upload-zone" id="dropZone">
          <input type="file" id="csvInput" accept=".csv" class="hidden" />
          <div class="space-y-3">
            <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
            </svg>
            <p class="text-sm text-gray-600 font-sans">
              <label for="csvInput" class="font-medium text-archive-accent hover:underline cursor-pointer">Click to upload</label> or drag and drop
            </p>
            <p class="text-xs text-gray-500 font-sans">Supports WooCommerce CSV • Auto-detects columns</p>
          </div>
        </div>
        
        <div id="uploadStatus" class="mt-6 text-sm font-sans hidden"></div>
        <div id="debugInfo" class="mt-4 text-xs text-gray-400 font-sans hidden"></div>
      </div>
    </section>

    <!-- Customer Mode -->
    <section id="customerView" class="hidden">
      <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-8 gap-4">
        <input type="text" id="searchInput" placeholder="Search by name, pattern, SKU..." class="input-field md:w-80">
        <div class="text-sm text-gray-500 font-sans"><span id="productCount">0</span> items loaded</div>
      </div>
      <div id="productGrid"></div>
      <div id="emptyState" class="text-center py-16 hidden">
        <p class="text-gray-500 font-sans">No items match your search.</p>
      </div>
    </section>

  </main>

  <!-- Cart Tray -->
  <div id="cart-tray" class="hidden">
    <div class="p-4 border-b border-archive-border flex justify-between items-center bg-archive-bg">
      <h3 class="font-medium">Selection Manifest</h3>
      <button id="closeCartBtn" class="text-gray-500 text-xl">&times;</button>
    </div>
    <div id="cartItems" class="flex-1 overflow-y-auto p-4 space-y-3"></div>
    <div class="p-4 border-t border-archive-border bg-archive-bg">
      <button id="exportBtn" class="btn btn-primary w-full">Export Manifest.txt</button>
      <button id="clearCartBtn" class="btn w-full mt-2 text-xs">Clear</button>
    </div>
  </div>

  <!-- Footer -->
  <footer class="border-t border-archive-border py-6 px-4 md:px-8 text-center text-sm text-gray-500 font-sans">
    &copy; <span id="year"></span> The Plate Archive Co.
  </footer>

  <!-- Scripts at Bottom for Reliable Loading -->
  <script>
    // ==================== STATE ====================
    const state = { products: [], cart: {}, mode: 'admin', searchTerm: '' };
    document.getElementById('year').textContent = new Date().getFullYear();

    // ==================== COLUMN MAPPING ====================
    const COLUMN_MAP = {
      name: ['name', 'title', 'item'],
      sku: ['sku', 'id', 'reference'],
      price: ['price', 'value', 'cost', 'regular price (usd)', 'regular price'],
      image: ['images', 'image', 'url', 'wordpress media url 1'],
      stock: ['stock', 'qty', 'inventory', 'stock qty'],
      wpImage1: ['wordpress media url 1', 'wp media url 1'],
      wpImage2: ['wordpress media url 2', 'wp media url 2'],
      wpImage3: ['wordpress media url 3', 'wp media url 3'],
      pattern: ['pattern name', 'pattern'],
      era: ['era / year made', 'era', 'year made'],
      origin: ['country of origin', 'origin', 'country'],
      condition: ['condition'],
      conditionNotes: ['condition notes', 'notes']
    };

    function findColumn(headers, variations) {
      const lower = headers.map(h => h?.toLowerCase().trim() || '');
      for (const v of variations) {
        const idx = lower.indexOf(v.toLowerCase());
        if (idx !== -1) return headers[idx];
      }
      return null;
    }

    // ==================== IMAGE PROCESSING ====================
    function processImageUrl(url) {
      if (!url || typeof url !== 'string') return 'https://via.placeholder.com/400x300/fafafa/1a1a1a?text=No+Image';
      let imageUrl = url.split(',')[0].trim();
      if (!imageUrl || imageUrl === '#REF!') return 'https://via.placeholder.com/400x300/fafafa/1a1a1a?text=No+Image';
      const driveMatch = imageUrl.match(/\/d\/([a-zA-Z0-9-_]+)/);
      if (driveMatch && driveMatch[1]) {
        return `https://drive.google.com/thumbnail?id=${driveMatch[1]}&sz=w800`;
      }
      if (imageUrl.startsWith('http')) return imageUrl;
      return 'https://via.placeholder.com/400x300/fafafa/1a1a1a?text=No+Image';
    }

    function mergeWordPressImages(row, headers) {
      const urls = [];
      const mainCol = findColumn(headers, COLUMN_MAP.image);
      if (mainCol && row[mainCol]?.toString().trim() && row[mainCol] !== '#REF!') {
        row[mainCol].split(',').forEach(u => { if (u.trim() && u.trim() !== '#REF!') urls.push(u.trim()); });
      }
      if (urls.length === 0) {
        [COLUMN_MAP.wpImage1, COLUMN_MAP.wpImage2, COLUMN_MAP.wpImage3].forEach(variations => {
          const col = findColumn(headers, variations);
          if (col && row[col]?.toString().trim() && row[col] !== '#REF!') urls.push(row[col].trim());
        });
      }
      return urls.filter(u => u).join(', ');
    }

    // ==================== CSV PARSING ====================
    function isDocumentationRow(row) {
      const patterns = ['WOOCOMMERCE IMPORT', 'STORE MANAGEMENT', 'HOW TO IMPORT', 'IMAGE WORKFLOW', 'GOLDEN RULES', 'CONDITION GRADE'];
      for (const value of Object.values(row)) {
        if (value && patterns.some(p => value.toString().toUpperCase().includes(p))) return true;
      }
      return false;
    }

    function isEmptyRow(row) {
      return Object.values(row).every(v => !v || v.toString().trim() === '' || v.toString().trim() === '#REF!');
    }

    function hasValidSKU(row, skuCol) {
      if (!skuCol || !row[skuCol]) return false;
      const sku = row[skuCol].toString().trim();
      return /^[A-Z]{2,4}-[A-Z]{2,4}-[A-Z]{2,4}-\d{3}$/.test(sku);
    }

    function normalizeProduct(row, headers) {
      const nameCol = findColumn(headers, COLUMN_MAP.name);
      const skuCol = findColumn(headers, COLUMN_MAP.sku);
      if (!nameCol || !skuCol) return null;
      const priceCol = findColumn(headers, COLUMN_MAP.price);
      const stockCol = findColumn(headers, COLUMN_MAP.stock);
      const price = parseFloat((row[priceCol] || '0').toString().replace(/[^0-9.]/g, '')) || 0;
      const stock = parseInt((row[stockCol] || '0').toString().replace(/[^0-9]/g, '')) || 0;
      const mergedImages = mergeWordPressImages(row, headers);
      return {
        name: row[nameCol]?.toString().trim() || 'Untitled',
        sku: row[skuCol]?.toString().trim(),
        price: price,
        priceFormatted: price > 0 ? `$${price.toFixed(2)}` : 'Contact',
        image: processImageUrl(mergedImages),
        stock: stock,
        inStock: stock > 0,
        pattern: row[findColumn(headers, COLUMN_MAP.pattern)]?.toString().trim() || '',
        era: row[findColumn(headers, COLUMN_MAP.era)]?.toString().trim() || '',
        origin: row[findColumn(headers, COLUMN_MAP.origin)]?.toString().trim() || '',
        condition: row[findColumn(headers, COLUMN_MAP.condition)]?.toString().trim() || '',
        conditionNotes: row[findColumn(headers, COLUMN_MAP.conditionNotes)]?.toString().trim() || ''
      };
    }

    // ==================== FILE UPLOAD ====================
    async function handleFileUpload(file) {
      const status = document.getElementById('uploadStatus');
      const debug = document.getElementById('debugInfo');
      status.classList.remove('hidden');
      status.textContent = 'Reading file...';
      status.className = 'mt-6 text-sm font-sans text-gray-600';
      debug.classList.add('hidden');
      
      try {
        const text = await file.text();
        debug.textContent = `File size: ${(text.length / 1024).toFixed(2)} KB`;
        debug.classList.remove('hidden');
        
        Papa.parse(text, {
          header: true,
          skipEmptyLines: true,
          complete: (results) => {
            const headers = Object.keys(results.data[0] || {});
            const skuCol = findColumn(headers, COLUMN_MAP.sku);
            
            const filtered = results.data.filter(row => {
              if (isDocumentationRow(row)) return false;
              if (isEmptyRow(row)) return false;
              if (!hasValidSKU(row, skuCol)) return false;
              return true;
            });
            
            const products = filtered.map(row => normalizeProduct(row, headers)).filter(p => p && p.name && p.sku);
            
            if (!products.length) {
              status.textContent = `✗ Error: No valid products found. Total rows: ${results.data.length}, Valid: ${filtered.length}. Check SKU format (e.g., RD-OC-DP-001)`;
              status.className = 'mt-6 text-sm font-sans text-red-600';
              debug.textContent += ` | Headers found: ${headers.length} | SKU column: ${skuCol || 'NOT FOUND'}`;
              return;
            }
            
            state.products = products;
            status.textContent = `✓ Successfully loaded ${products.length} items. Click "Customer" to view.`;
            status.className = 'mt-6 text-sm font-sans text-green-700';
            debug.textContent += ` | Products loaded: ${products.length}`;
          },
          error: (err) => {
            status.textContent = `✗ Parse Error: ${err.message}`;
            status.className = 'mt-6 text-sm font-sans text-red-600';
          }
        });
      } catch (err) {
        status.textContent = `✗ Error: ${err.message}`;
        status.className = 'mt-6 text-sm font-sans text-red-600';
      }
    }

    // ==================== RENDER ====================
    function renderGrid() {
      const term = state.searchTerm.toLowerCase();
      const filtered = state.products.filter(p => 
        p.name.toLowerCase().includes(term) || p.sku.toLowerCase().includes(term) ||
        p.pattern?.toLowerCase().includes(term) || p.era?.toLowerCase().includes(term)
      );
      document.getElementById('productCount').textContent = filtered.length;
      document.getElementById('emptyState').classList.toggle('hidden', filtered.length > 0);
      
      if (filtered.length === 0) { document.getElementById('productGrid').innerHTML = ''; return; }
      
      document.getElementById('productGrid').innerHTML = filtered.map(p => {
        const inCart = state.cart[p.sku];
        const qty = inCart ? inCart.quantity : 0;
        return `
          <div class="product-card fade-in" onclick="addToCart('${p.sku}')">
            <div class="aspect-square bg-gray-50 mb-3 overflow-hidden rounded-sm">
              <img src="${p.image}" alt="${p.name}" class="w-full h-full object-cover" loading="lazy" onerror="this.src='https://via.placeholder.com/400x300/fafafa/1a1a1a?text=No+Image'">
            </div>
            <h3 class="font-medium text-lg mb-1 leading-tight">${p.name}</h3>
            ${p.pattern ? `<p class="text-sm text-archive-accent mb-1">${p.pattern}</p>` : ''}
            <p class="text-xs text-gray-500 font-sans mb-2">SKU: ${p.sku}</p>
            <div class="flex justify-between items-center mb-3">
              <span class="font-medium">${p.priceFormatted}</span>
              <span class="text-xs font-sans ${p.inStock ? 'text-green-700' : 'text-red-600'}">${p.inStock ? `(${p.stock})` : 'Out'}</span>
            </div>
            <button class="btn w-full ${!p.inStock ? 'opacity-50' : ''}" ${!p.inStock ? 'disabled' : ''}>${qty > 0 ? `Add More (${qty})` : 'Select'}</button>
          </div>
        `;
      }).join('');
    }

    function renderCart() {
      const items = Object.values(state.cart);
      document.getElementById('cartCount').textContent = items.reduce((s, i) => s + i.quantity, 0);
      if (items.length === 0) { document.getElementById('cartItems').innerHTML = '<p class="text-center text-gray-500 py-4 font-sans text-sm">No items</p>'; return; }
      document.getElementById('cartItems').innerHTML = items.map(i => `
        <div class="flex justify-between items-center py-2 border-b border-archive-border">
          <div class="flex-1"><p class="font-medium text-sm">${i.product.name}</p><p class="text-xs text-gray-500">${i.product.sku}</p></div>
          <div class="flex items-center gap-2">
            <button class="w-6 h-6 border" onclick="updateCartQty('${i.product.sku}', -1)">−</button>
            <span class="w-6 text-center text-sm">${i.quantity}</span>
            <button class="w-6 h-6 border" onclick="updateCartQty('${i.product.sku}', 1)">+</button>
          </div>
        </div>
      `).join('');
    }

    // ==================== CART ====================
    function addToCart(sku) {
      const product = state.products.find(p => p.sku === sku);
      if (!product || !product.inStock) return;
      if (!state.cart[sku]) state.cart[sku] = { product, quantity: 0 };
      if (state.cart[sku].quantity >= product.stock) { alert('Max stock reached'); return; }
      state.cart[sku].quantity++;
      renderCart();
      renderGrid();
      document.getElementById('cart-tray').classList.remove('hidden');
    }
    function updateCartQty(sku, delta) {
      if (!state.cart[sku]) return;
      const newQty = state.cart[sku].quantity + delta;
      if (newQty <= 0) { delete state.cart[sku]; } else { state.cart[sku].quantity = newQty; }
      renderCart();
      renderGrid();
    }

    // ==================== MODE TOGGLE ====================
    function setMode(mode) {
      state.mode = mode;
      const adminView = document.getElementById('adminView');
      const customerView = document.getElementById('customerView');
      const adminBtn = document.getElementById('adminBtn');
      const customerBtn = document.getElementById('customerBtn');
      const cartBtn = document.getElementById('toggleCartBtn');
      
      if (mode === 'admin') {
        adminView.classList.remove('hidden');
        customerView.classList.add('hidden');
        cartBtn.classList.add('hidden');
        adminBtn.classList.add('font-bold', 'text-archive-accent');
        adminBtn.classList.remove('text-gray-500');
        customerBtn.classList.remove('font-bold', 'text-archive-accent');
        customerBtn.classList.add('text-gray-500');
      } else {
        adminView.classList.add('hidden');
        customerView.classList.remove('hidden');
        cartBtn.classList.remove('hidden');
        customerBtn.classList.add('font-bold', 'text-archive-accent');
        customerBtn.classList.remove('text-gray-500');
        adminBtn.classList.remove('font-bold', 'text-archive-accent');
        adminBtn.classList.add('text-gray-500');
        renderGrid();
        renderCart();
      }
    }

    // ==================== EXPORT ====================
    function exportManifest() {
      const items = Object.values(state.cart);
      if (!items.length) { alert('No items selected'); return; }
      let content = `THE PLATE ARCHIVE CO. — SELECTION MANIFEST\nGenerated: ${new Date().toLocaleString()}\n${'='.repeat(60)}\n\n`;
      let total = 0;
      items.forEach(i => {
        const lineTotal = i.product.price * i.quantity;
        total += lineTotal;
        content += `SKU: ${i.product.sku}\nItem: ${i.product.name}\nQty: ${i.quantity}\nPrice: ${i.product.priceFormatted}\nSubtotal: $${lineTotal.toFixed(2)}\n${'-'.repeat(40)}\n`;
      });
      content += `\nGRAND TOTAL: $${total.toFixed(2)}\n\nThank you.\nThe Plate Archive Co.`;
      const blob = new Blob([content], { type: 'text/plain' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `PlateArchive_Manifest_${new Date().toISOString().slice(0,19).replace(/[:.]/g,'-')}.txt`;
      a.click();
    }

    // ==================== EVENTS ====================
    document.getElementById('csvInput').addEventListener('change', e => { if (e.target.files[0]) handleFileUpload(e.target.files[0]); });
    document.getElementById('dropZone').addEventListener('click', () => document.getElementById('csvInput').click());
    document.getElementById('dropZone').addEventListener('dragover', e => { e.preventDefault(); this.classList.add('border-archive-accent'); });
    document.getElementById('dropZone').addEventListener('dragleave', e => { e.preventDefault(); this.classList.remove('border-archive-accent'); });
    document.getElementById('dropZone').addEventListener('drop', e => { e.preventDefault(); if (e.dataTransfer.files[0]) handleFileUpload(e.dataTransfer.files[0]); });
    document.getElementById('searchInput').addEventListener('input', e => { state.searchTerm = e.target.value.trim(); renderGrid(); });
    document.getElementById('adminBtn').addEventListener('click', () => setMode('admin'));
    document.getElementById('customerBtn').addEventListener('click', () => setMode('customer'));
    document.getElementById('toggleCartBtn').addEventListener('click', () => document.getElementById('cart-tray').classList.remove('hidden'));
    document.getElementById('closeCartBtn').addEventListener('click', () => document.getElementById('cart-tray').classList.add('hidden'));
    document.getElementById('exportBtn').addEventListener('click', exportManifest);
    document.getElementById('clearCartBtn').addEventListener('click', () => { state.cart = {}; renderCart(); renderGrid(); });

    // Initialize
    setMode('admin');
    console.log('✓ The Plate Archive Co. initialized');
  </script>
</body>
</html>
